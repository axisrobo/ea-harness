# ============================================================
# ArchHarness x Coalgebraic Workflow Model
# For: "Probabilistic Execution Beyond Classical Systems:
#       A Context-Dependent Coalgebraic Framework with
#       Canonical Minimal Realisation"
# ============================================================
# Core argument:
#   The ArchHarness agent pipeline is a concrete instance of
#   the context-dependent transition system the coalgebraic
#   paper formalises. The "canonical minimal realisation" result
#   directly answers the engineering question: what is the
#   shortest agent sequence sufficient to achieve the review goal?
# ============================================================

# ──────────────────────────────────────────────────────────
# State machine definition
# ──────────────────────────────────────────────────────────
system: "ArchHarness Agent Pipeline"

states:
  - id: S0
    name: "unreviewed"
    description: "Architecture intent exists but no formal artefact"

  - id: S1
    name: "requirements_captured"
    description: "req.yaml + REQ.md produced by arch-requirements"
    observable_properties:
      - "application_count > 0"
      - "interaction_count > 0"
      - "all_critical_gaps == false"

  - id: S2
    name: "designed"
    description: "Architecture YAML blueprint produced by arch-design"
    observable_properties:
      - "arch.yaml exists"
      - "platform_selected in [aws, azure, private_cloud]"
      - "all_components_have_runtime == true"

  - id: S3
    name: "diagrammed"
    description: "draw.io + PNG produced by arch-diagram tool"
    observable_properties:
      - "output/*.drawio exists"
      - "diagram_is_renderable == true"

  - id: S4
    name: "validated"
    description: "arch-validate JSON report produced"
    observable_properties:
      - "validate_score is not null"
      - "issues_list is not null"
      - "must_fix_count is known"

  - id: S5
    name: "security_reviewed"
    description: "arch-security attack path analysis complete"
    observable_properties:
      - "auth_findings is not null"
      - "credential_findings is not null"
      - "network_boundary_findings is not null"

  - id: S6
    name: "committee_reviewed"
    description: "arch-review gate decision produced"
    observable_properties:
      - "gate_decision in [APPROVED, CONDITIONS, REJECTED]"
      - "dimension_scores complete"

  - id: S7
    name: "optimized"
    description: "arch-optimize P0/P1/P2/P3 backlog produced"
    observable_properties:
      - "backlog is not null"
      - "sprint_items assigned"

  - id: S8
    name: "documented"
    description: "arch-report Confluence page / exec summary produced"
    observable_properties:
      - "report_artifact exists"
      - "target_audience addressed"

  - id: S_TERMINAL
    name: "governance_complete"
    description: "Architecture has passed gate, remediation planned, documentation done"

# ──────────────────────────────────────────────────────────
# Context-dependent transitions
# ──────────────────────────────────────────────────────────
transitions:
  - from: S0
    to: S1
    agent: "arch-requirements"
    context_conditions: "always required"
    probability: 1.0

  - from: S1
    to: S2
    agent: "arch-design"
    context_conditions: "new system OR significant redesign"
    probability_given_new_system: 1.0
    probability_given_existing_diagram: 0.3
    note: "If diagram already exists, S1 → S3 is more likely"

  - from: S1
    to: S3
    agent: "arch-diagram (from existing)"
    context_conditions: "existing draw.io provided"
    probability_given_existing_diagram: 0.7

  - from: S2
    to: S3
    agent: "arch-diagram tool"
    context_conditions: "always"
    probability: 1.0

  - from: S3
    to: S4
    agent: "arch-validate"
    context_conditions: "always"
    probability: 1.0

  - from: S4
    to: S5
    agent: "arch-security"
    context_conditions:
      - "validate_score < 7.0 on Security_Compliance dimension"
      - "OR system is internet_facing"
      - "OR system handles [Prefix] Restricted data"
    probability_given_security_concern: 0.95
    probability_given_internal_only: 0.2

  - from: S4
    to: S6
    agent: "arch-review"
    context_conditions: "validate_score >= 6.0"
    probability_given_passing_score: 0.9
    probability_given_failing_score: 0.1    # committee may still review to reject

  - from: S5
    to: S6
    agent: "arch-review"
    context_conditions: "security findings resolved or accepted"
    probability: 0.8

  - from: S6
    to: S7
    agent: "arch-optimize"
    context_conditions: "gate = CONDITIONS or gate = REJECTED"
    probability_given_conditions: 0.9
    probability_given_approved: 0.3

  - from: S6
    to: S8
    agent: "arch-report"
    context_conditions: "gate = APPROVED"
    probability_given_approved: 0.8

  - from: S7
    to: S8
    agent: "arch-report"
    context_conditions: "backlog prioritized"
    probability: 0.7

  - from: S8
    to: S_TERMINAL
    agent: "(human review board)"
    probability: 1.0

# ──────────────────────────────────────────────────────────
# Canonical minimal realisations (context-dependent)
# ──────────────────────────────────────────────────────────
minimal_realisations:
  description: >
    The coalgebraic framework's key result is that observationally equivalent
    executions can be collapsed to a canonical minimal path. For ArchHarness,
    this answers: what is the shortest agent sequence that produces a
    governance-complete output (S_TERMINAL) for a given context?

  context_low_risk_internal:
    description: "Low-complexity internal system, no external users, no sensitive data"
    minimal_path: [S0, S1, S2, S3, S4, S6, S8, S_TERMINAL]
    agents: [arch-requirements, arch-design, arch-diagram, arch-validate, arch-review, arch-report]
    skipped: [arch-security, arch-optimize]
    rationale: >
      arch-security adds no observational value when Security_Compliance score >= 8.0.
      arch-optimize adds no value when gate = APPROVED with no conditions.
    coalgebra_note: >
      States S5 and S7 are observable-equivalent to S4 and S6 respectively
      in this context — the security review sees the same system the validator
      already characterised, and the optimize step produces an empty backlog.
      Canonical minimal realisation eliminates them.

  context_high_risk_external:
    description: "Internet-facing system with sensitive data and external integrations"
    minimal_path: [S0, S1, S2, S3, S4, S5, S6, S7, S8, S_TERMINAL]
    agents: [arch-requirements, arch-design, arch-diagram, arch-validate, arch-security, arch-review, arch-optimize, arch-report]
    skipped: []
    rationale: >
      All states are observationally distinct in this context. Each agent
      adds findings the previous agent cannot see (arch-security sees attack
      paths arch-validate misses; arch-optimize turns findings into sprint tasks).

  context_existing_diagram_review:
    description: "Reviewing an existing diagram submitted for committee approval"
    minimal_path: [S0, S1, S3, S4, S6, S8, S_TERMINAL]
    agents: [arch-requirements, arch-diagram(existing), arch-validate, arch-review, arch-report]
    skipped: [arch-design, arch-security, arch-optimize]
    rationale: >
      arch-design is skipped (diagram already exists).
      If validate score >= 8.0, arch-security and arch-optimize add no
      state-changing findings. Canonical path skips them.

# ──────────────────────────────────────────────────────────
# Evidence for coalgebraic framework
# ──────────────────────────────────────────────────────────
evidence_for_paper:
  concrete_instantiation: >
    ArchHarness provides a real-world, deployed workflow that can serve
    as a concrete instantiation of the context-dependent coalgebraic model.
    The 8 agent states, 14 transitions, and 3 minimal realisations above
    are directly derivable from the project's CLAUDE.md and ARCHITECTURE.md.

  context_dependence: >
    The transition probabilities above show genuine context-dependence:
    whether arch-security is invoked depends on Security_Compliance score
    AND system classification AND data sensitivity — not on a fixed workflow.
    This is precisely the "context-dependent" condition the paper formalises.

  minimal_realisation_utility: >
    The three minimal paths differ by 2-3 agents depending on context.
    In enterprise settings with 50+ architecture reviews per year, skipping
    2 agents per review when safe saves ~40% of review effort. The coalgebraic
    result provides the formal guarantee that the shorter path is observationally
    equivalent — critical for enterprise adoption.

  open_question_for_paper: >
    Is there a bisimulation between the high-risk and low-risk execution paths?
    If the low-risk path produces observationally equivalent governance outcomes
    (same S_TERMINAL state) as the high-risk path for low-risk systems,
    this is a formal proof of safe skipping — not just a heuristic.
